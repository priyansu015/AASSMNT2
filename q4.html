<!DOCTYPE html>
<html>
<head>
    <title>My Weekly Schedule</title>
</head>
<body>

    <!-- Heading -->
    <h1>My Weekly Schedule</h1>

    <!-- Table -->
    <table border="1">

        <!-- Header Row -->
        <tr>
            <th>Day</th>
            <th>Activities</th>
        </tr>

        <!-- Days and Activities -->
        <tr>
            <td>Monday</td>
            <td>Attend classes, Study, Gym</td>
        </tr>

        <tr>
            <td>Tuesday</td>
            <td>Lab work, Assignment, Practice coding</td>
        </tr>

        <tr>
            <td>Wednesday</td>
            <td>Classes, Library study</td>
        </tr>

        <tr>
            <td>Thursday</td>
            <td>Project work, Group discussion</td>
        </tr>

        <tr>
            <td>Friday</td>
            <td>Classes, Revision</td>
        </tr>

        <tr>
            <td>Saturday</td>
            <td>Sports, Relax, Watch movies</td>
        </tr>

        <tr>
            <td>Sunday</td>
            <td>Rest, Family time, Plan next week</td>
        </tr>

    </table>

</body>
</html>
