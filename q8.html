<!DOCTYPE html>
<html>
<head>
    <title>Styled Table</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        table {
            width: 60%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            height: 40px;
        }

        th {
            background-color: #4a90e2;
            color: white;
        }

        /* Alternate rows */
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #dbe9ff;
        }
    </style>

</head>
<body>

    <h1>Student Table</h1>

    <table>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>Ravi</td>
            <td>101</td>
            <td>85</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>102</td>
            <td>90</td>
        </tr>

        <tr>
            <td>Amit</td>
            <td>103</td>
            <td>78</td>
        </tr>

        <tr>
            <td>Neha</td>
            <td>104</td>
            <td>88</td>
        </tr>

    </table>

</body>
</html>
