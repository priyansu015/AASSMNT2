<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .row {
            display: flex;
        }

        .cell {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            font-size: 20px;
            padding: 10px;
        }

        .label {
            font-weight: bold;
            background-color: #e8f0fe;
        }

        .value {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Student Information</div>

    <div class="row">
        <div class="cell label">Name</div>
        <div class="cell value">Priyansu Samal</div>
    </div>

    <div class="row">
        <div class="cell label">Address</div>
        <div class="cell value">Odisha, India</div>
    </div>

    <div class="row">
        <div class="cell label">Course</div>
        <div class="cell value">B.Tech</div>
    </div>

    <div class="row">
        <div class="cell label">Email</div>
        <div class="cell value">priyansu@email.com</div>
    </div>

    <div class="row">
        <div class="cell label">Phone Number</div>
        <div class="cell value">9876543210</div>
    </div>

</div>

</body>
</html>
